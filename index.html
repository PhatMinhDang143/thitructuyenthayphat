<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HỆ THỐNG THI TRỰC TUYẾN - PRO MOBILE</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

body {
    font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden;
}

.glass-panel {
    background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05);
}

.custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
.custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
.custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
.custom-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }

.timer-phase-1 { color: #38bdf8; }
.timer-phase-2 { color: #fbbf24; }
.timer-danger { color: #ef4444 !important; animation: pulse-red 1s infinite; }
@keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.focus-active .sidebar-panel { display: none !important; }
.focus-active .mobile-toggle-btn { display: none !important; }
.material-icons { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }

/* CSS Tùy biến cho khung làm bài Mobile */
@media (max-width: 768px) {
    .sidebar-panel {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
        transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        height: 85dvh; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
    }
    .sidebar-panel.sheet-open { transform: translateY(0); }
}

.pdf-container iframe { width: 100%; height: 100%; border: none; }
</style>

<script>
// ==========================================
// DÁN ĐƯỜNG LINK WEB APP ADMIN CỦA BẠN VÀO ĐÂY
// ==========================================
const API_URL = "https://script.google.com/macros/s/AKfycbyVERzEfEK7t_Hp6PpWZYodTN-o7t4omX6W69p2Hn7URj71agiiKgvs_b954aiNMfn_/exec";
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-plugins="transform-react-jsx">
const { useState, useEffect, useRef } = React;

const Icon = ({ name, size = 20, className = "" }) => {
    const iconMap = {
        'graduation-cap': 'school', 'users': 'people', 'log-out': 'logout', 'file-text': 'description',
        'minimize': 'fullscreen_exit', 'maximize': 'fullscreen', 'user': 'person', 'edit-3': 'edit',
        'clipboard-list': 'assignment', 'x': 'close', 'flag': 'flag', 'chevron-down': 'expand_more',
        'trophy': 'emoji_events', 'arrow-left': 'arrow_back', 'check-square': 'check_box',
        'check': 'check', 'alert-triangle': 'warning', 'loader': 'hourglass_empty', 'clock': 'schedule', 'zap': 'bolt'
    };
    const matName = iconMap[name] || 'help';
    return <span className={`material-icons ${className}`} style={{ fontSize: size }}>{matName}</span>;
};

const FooterCredit = () => (
    <div className="mt-8 text-center text-slate-500 text-xs md:text-sm w-full py-4 shrink-0">
        Bản quyền website thuộc về <strong className="text-indigo-400">Đặng Minh Phát</strong>
    </div>
);

// --- 1. MÀN HÌNH ĐĂNG NHẬP ---
const AuthView = ({ onLoginSuccess, setUser, setView }) => {
    const [isLoading, setIsLoading] = useState(false);

    const handleLoginSubmit = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        const username = e.target.u.value;
        const password = e.target.p.value;

        try {
            const res = await fetch(`${API_URL}?action=login`, {
                method: 'POST', body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if(data.success) {
                onLoginSuccess({ ...data, role: 'student', username: data.username });
            } else { alert(data.message || "Sai tài khoản hoặc mật khẩu"); }
        } catch (err) { alert("Lỗi mạng, kiểm tra lại API_URL"); }
        setIsLoading(false);
    };

    return (
        <div className="min-h-[100dvh] flex flex-col items-center justify-center p-4 md:p-6 bg-[#0f172a] relative overflow-hidden">
            <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>
            <div className="w-full max-w-5xl grid md:grid-cols-2 gap-6 md:gap-8 flex-1 content-center relative z-10">
                <div className="glass-panel p-6 md:p-10 rounded-[2rem] shadow-2xl border-t-4 border-indigo-500">
                    <h2 className="text-2xl md:text-3xl font-bold mb-2 uppercase text-white">ĐĂNG NHẬP TÀI KHOẢN</h2>
                    <p className="text-slate-400 mb-6 md:mb-8 text-sm">Liên hệ thầy Phát nếu chưa có tài khoản</p>
                    <form onSubmit={handleLoginSubmit} className="space-y-4 md:space-y-5">
                        <div>
                            <label className="block text-sm font-semibold text-slate-300 mb-2">Tài khoản (SBD)</label>
                            <input name="u" required className="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-indigo-500 text-white" placeholder="Nhập mã định danh..." />
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-slate-300 mb-2">Mật khẩu</label>
                            <input name="p" type="password" required className="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-indigo-500 text-white" placeholder="Nhập mật khẩu..." />
                        </div>
                        <button type="submit" disabled={isLoading} className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold uppercase tracking-wider transition-colors mt-2 disabled:opacity-50">
                            {isLoading ? 'Đang xác thực...' : 'Vào hệ thống'}
                        </button>
                    </form>
                </div>
                <div className="glass-panel p-6 md:p-10 rounded-[2rem] flex flex-col justify-center items-center text-center border-t-4 border-slate-600 mt-6 md:mt-0">
                    <div className="bg-slate-800 p-5 rounded-full mb-4 md:mb-6"><Icon name="users" size={32} className="text-slate-400" /></div>
                    <h2 className="text-xl md:text-2xl font-bold mb-3 uppercase text-white">Thi thử tự do</h2>
                    <p className="text-slate-400 text-sm mb-6 md:mb-8 px-4">Dành cho khách. Khách sẽ KHÔNG xem được chi tiết đáp án sau khi nộp bài.</p>
                    <button onClick={() => {
                        setUser({name: 'Khách ' + Math.floor(Math.random() * 9999), role: 'guest', username: 'guest', group: 'Khách'});
                        setView('lobby');
                    }} className="w-full border-2 border-slate-600 hover:border-slate-400 hover:bg-slate-800 py-4 rounded-xl font-bold uppercase transition-all">Bắt đầu như Khách</button>
                </div>
            </div>
            <FooterCredit />
        </div>
    );
};

// --- 2. MÀN HÌNH CHỌN ĐỀ LOBBY ---
const LobbyView = ({ user, onLogout, onSelectExam }) => {
    const [exams, setExams] = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        fetch(`${API_URL}?action=get_exams`)
            .then(res => res.json())
            .then(data => { setExams(data.exams || []); setLoading(false); })
            .catch(err => setLoading(false));
    }, []);

    const isExamOpen = (cfg) => {
        if (!cfg.start_time) return true;
        const now = new Date().getTime();
        const start = new Date(cfg.start_time).getTime();
        const end = cfg.end_time ? new Date(cfg.end_time).getTime() : Infinity;
        return now >= start && now <= end;
    };

    return (
        <div className="max-w-6xl mx-auto p-4 md:p-10 min-h-[100dvh] flex flex-col">
            <header className="flex justify-between items-center mb-8 border-b border-slate-800 pb-6 pt-4">
                <div>
                    <p className="text-indigo-400 font-semibold mb-1 text-sm md:text-base">Ây dô {user.name} đã chịu vào đây làm đề rồi à =))</p>
                    <h1 className="text-2xl md:text-4xl font-extrabold uppercase tracking-tight text-white">Danh sách đề thi</h1>
                </div>
                <button onClick={onLogout} className="flex items-center gap-2 p-3 md:px-6 md:py-3 bg-slate-800 hover:bg-rose-600/20 hover:text-rose-500 rounded-xl font-semibold transition-colors">
                    <Icon name="log-out" size={18}/><span className="hidden md:inline">Đăng xuất</span>
                </button>
            </header>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-1 content-start">
                {loading ? (
                    <div className="col-span-full text-center py-20 text-slate-500"><Icon name="loader" size={24} className="animate-spin mb-2" /> Đang đồng bộ...</div>
                ) : exams.length > 0 ? exams.map(exam => {
                    const cfg = exam.questions || {};
                    const open = isExamOpen(cfg);
                    return (
                        <div key={exam.id} className={`glass-panel p-6 md:p-8 rounded-2xl flex flex-col justify-between transition-colors group ${open ? 'hover:border-indigo-500' : 'opacity-70'}`}>
                            <div>
                                <div className="flex justify-between items-start mb-4">
                                    <div className="bg-slate-800 px-3 py-1 rounded text-xs font-bold text-slate-300">CẤU TRÚC {cfg.num_p1 || 0}-{cfg.num_p2 || 0}-{cfg.num_p3 || 0}</div>
                                    <Icon name="file-text" className="text-slate-500" />
                                </div>
                                <h3 className="text-lg md:text-xl font-bold mb-4 text-white uppercase">{exam.title}</h3>
                                <p className="text-sm text-slate-400 mb-8 flex items-center gap-2"><Icon name="clock" size={16}/> Thời gian: <strong className="text-white">{exam.duration} phút</strong></p>
                            </div>
                            <button onClick={() => open ? onSelectExam(exam) : alert('Đề thi chưa tới giờ mở hoặc đã đóng!')} className={`w-full py-3 rounded-xl font-bold text-sm uppercase transition-colors ${open ? 'bg-indigo-600 hover:bg-indigo-500 text-white' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}>
                                {open ? 'Vào thi ngay' : 'Chưa mở'}
                            </button>
                        </div>
                    );
                }) : (<div className="col-span-full text-center py-20 text-slate-500">Chưa có đề thi nào trên hệ thống.</div>)}
            </div>
            <FooterCredit />
        </div>
    );
};

// --- 3. MÀN HÌNH LÀM BÀI ---
const ExamView = ({ user, exam, onExamSubmit }) => {
    const cfg = exam.questions || {};
    const numP1 = cfg.num_p1 || 0;
    const numP2 = cfg.num_p2 || 0;
    const numP3 = cfg.num_p3 || 0;

    const p1Questions = Array.from({length: numP1}, (_, i) => i + 1);
    const p2Questions = Array.from({length: numP2}, (_, i) => i + 1);
    const p3Questions = Array.from({length: numP3}, (_, i) => i + 1);

    const [isFocusMode, setIsFocusMode] = useState(false);
    const [isMobileSheetOpen, setIsMobileSheetOpen] = useState(false);

    // Phase 1: 5 phút chuẩn bị. Phase 2: Thời gian làm bài chính thức
    const [phase, setPhase] = useState(1);
    const [timeLeft, setTimeLeft] = useState(300); 

    const [cheatCount, setCheatCount] = useState(0);
    const [ansPart1, setAnsPart1] = useState({});
    const [ansPart2, setAnsPart2] = useState({});
    const [ansPart3, setAnsPart3] = useState({});
    const [flaggedQuestions, setFlaggedQuestions] = useState({});
    const timerRef = useRef(null);

    // Tiền xử lý link Google Drive để hiển thị trong iframe
    const getPreviewUrl = (url) => {
        if (!url) return '';
        if (url.includes('drive.google.com/file/d/')) return url.replace(/\/view.*/, '/preview');
        return url;
    };
    const pdfUrl = getPreviewUrl(cfg.file_link);

    // Chống gian lận
    useEffect(() => {
        const handleVisibilityChange = () => {
            if (document.hidden) setCheatCount(prev => prev + 1);
        };
        document.addEventListener('visibilitychange', handleVisibilityChange);
        return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
    }, []);

    // Hẹn giờ đa pha
    useEffect(() => {
        timerRef.current = setInterval(() => {
            setTimeLeft(prev => {
                if (prev <= 1) {
                    clearInterval(timerRef.current);
                    if (phase === 1) {
                        setPhase(2); 
                        setTimeLeft(exam.duration * 60); // Chuyển sang giờ thi chính thức
                    } else {
                        handleSubmit(true); // Hết giờ làm bài -> Nộp tự động
                    }
                    return 0;
                }
                return prev - 1;
            });
        }, 1000);
        return () => clearInterval(timerRef.current);
    }, [phase]);

    const handleSubmit = (isAuto = false) => {
        if (!isAuto && !window.confirm('Bạn có chắc chắn muốn nộp bài sớm?')) return;
        clearInterval(timerRef.current);
        
        // Gói đáp án và gọi hàm nộp
        const studentAnswers = { p1: ansPart1, p2: ansPart2, p3: ansPart3 };
        onExamSubmit(studentAnswers, cheatCount, exam);
    };

    const minutes = Math.floor(timeLeft / 60);
    const seconds = String(timeLeft % 60).padStart(2, '0');
    const isDanger = phase === 2 && timeLeft < 300;

    return (
        <div className={`h-[100dvh] flex flex-col ${isFocusMode ? 'focus-active' : ''}`}>
            <header className="h-14 md:h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-3 md:px-6 shrink-0 z-50">
                <div className="flex items-center gap-2 md:gap-4">
                    <button onClick={() => setIsFocusMode(!isFocusMode)} className={`p-2 rounded-lg ${isFocusMode ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400'}`}><Icon name={isFocusMode ? "minimize" : "maximize"} size={18}/></button>
                    <span className="font-bold text-xs md:text-sm text-indigo-400 hidden sm:inline-block uppercase truncate max-w-[150px] md:max-w-xs">{exam.title}</span>
                </div>

                <div className="flex flex-col items-center justify-center bg-slate-800/50 border border-slate-700/50 px-4 py-1 rounded-xl min-w-[100px]">
                    <p className="text-[9px] uppercase tracking-wider text-slate-400 font-semibold">{phase === 1 ? 'Điền thông tin' : 'Thời gian làm bài'}</p>
                    <p className={`text-sm md:text-base font-black font-mono tracking-tight ${isDanger ? 'timer-danger' : (phase === 1 ? 'timer-phase-1' : 'timer-phase-2')}`}>{minutes}:{seconds}</p>
                </div>

                <div className="flex items-center gap-2">
                    <div className="text-right hidden md:block">
                        <p className="text-xs font-bold text-slate-200">{user.name}</p>
                        <p className="text-[10px] text-indigo-400 uppercase font-semibold tracking-wider">{user.group || 'Khách'}</p>
                    </div>
                    <div className="bg-gradient-to-tr from-indigo-600 to-violet-500 p-2 rounded-xl shadow-lg shadow-indigo-600/20"><Icon name="user" size={16} className="text-white" /></div>
                </div>
            </header>

            <div className="flex-1 flex overflow-hidden relative">
                {/* BÊN TRÁI: ĐỀ THI PDF (Iframe thay vì pdf.js để tương thích GDrive) */}
                <div className="flex-1 h-full w-full relative z-10 bg-[#1e1e1e] p-2 md:p-6 pdf-container">
                    {pdfUrl ? (
                        <iframe src={pdfUrl} allow="autoplay" className="w-full h-full rounded-xl shadow-2xl"></iframe>
                    ) : (
                        <div className="flex flex-col items-center justify-center h-full text-slate-500">
                            <Icon name="file-text" size={64} className="mb-4 opacity-30" />
                            <p className="text-sm font-semibold">Đề thi không đính kèm file PDF</p>
                        </div>
                    )}

                    {!isMobileSheetOpen && (
                        <button onClick={() => setIsMobileSheetOpen(true)} className="mobile-toggle-btn md:hidden absolute bottom-6 right-6 z-40 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-full shadow-[0_4px_20px_rgba(79,70,229,0.5)] font-bold flex items-center gap-2 transition-all">
                            <Icon name="edit-3" size={18}/> Điền đáp án
                        </button>
                    )}
                </div>

                {/* BÊN PHẢI: PHIẾU BÀI LÀM */}
                <aside className={`sidebar-panel w-80 xl:w-90 bg-slate-900 border-l border-slate-800 flex flex-col h-full shrink-0 ${isMobileSheetOpen ? 'sheet-open' : ''}`}>
                    <div className="p-4 border-b border-slate-800 flex items-center justify-between shrink-0 bg-slate-900/50">
                        <div className="flex items-center gap-2">
                            <Icon name="clipboard-list" className="text-indigo-400" />
                            <h3 className="font-bold text-sm uppercase tracking-wider text-slate-200">Phiếu bài làm</h3>
                        </div>
                        <button onClick={() => setIsMobileSheetOpen(false)} className="md:hidden p-2 text-slate-400 hover:text-white bg-slate-800 rounded-lg"><Icon name="x" size={16}/></button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 custom-scroll space-y-6 pb-24 md:pb-6">
                        {/* PHẦN I */}
                        {p1Questions.length > 0 && (
                            <div className="mb-6">
                                <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3">Phần I: Trắc nghiệm nhiều lựa chọn</h4>
                                <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-4 xl:grid-cols-5 gap-2">
                                    {p1Questions.map((qNum) => {
                                        const isFlagged = flaggedQuestions[`p1_${qNum}`];
                                        return (
                                            <div key={qNum} className="relative flex flex-col items-center p-2 bg-slate-800/40 rounded-xl border border-slate-700/50">
                                                <button onClick={() => setFlaggedQuestions({...flaggedQuestions, [`p1_${qNum}`]: !isFlagged})} className={`absolute top-1 right-1 ${isFlagged ? 'text-amber-400' : 'text-slate-600 hover:text-slate-400'}`}><Icon name="flag" size={10} /></button>
                                                <span className="text-[10px] font-bold text-slate-500 mb-1">C.{qNum}</span>
                                                <div className="flex flex-col gap-1 w-full">
                                                    {['A', 'B', 'C', 'D'].map(ans => (
                                                        <button key={ans} onClick={() => setAnsPart1({...ansPart1, [qNum]: ans})} className={`py-1 rounded text-xs font-bold transition-all ${ansPart1[qNum] === ans ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{ans}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* PHẦN II */}
                        {p2Questions.length > 0 && (
                            <div className="mb-6">
                                <h4 className="text-xs font-bold text-amber-400 uppercase tracking-wider mb-3">Phần II: Trắc nghiệm Đúng/Sai</h4>
                                <div className="space-y-3">
                                    {p2Questions.map((qNum) => {
                                        const isFlagged = flaggedQuestions[`p2_${qNum}`];
                                        return (
                                            <div key={qNum} className="p-3 bg-slate-800/40 rounded-xl border border-slate-700/50 relative">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-xs font-bold text-slate-400">Câu {qNum}</span>
                                                    <button onClick={() => setFlaggedQuestions({...flaggedQuestions, [`p2_${qNum}`]: !isFlagged})} className={`${isFlagged ? 'text-amber-400' : 'text-slate-600'}`}><Icon name="flag" size={12} /></button>
                                                </div>
                                                <div className="grid grid-cols-4 gap-2 text-center text-[10px] text-slate-500 font-semibold mb-1">
                                                    <div>Ý a</div><div>Ý b</div><div>Ý c</div><div>Ý d</div>
                                                </div>
                                                <div className="grid grid-cols-4 gap-2">
                                                    {['a', 'b', 'c', 'd'].map(sub => (
                                                        <div key={sub} className="flex flex-col gap-1 bg-slate-900/40 p-1 rounded-lg">
                                                            <button onClick={() => setAnsPart2({...ansPart2, [qNum]: {...ansPart2[qNum], [sub]: 'Đ'}})} className={`py-0.5 rounded font-bold text-[10px] ${ansPart2[qNum]?.[sub] === 'Đ' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400'}`}>Đ</button>
                                                            <button onClick={() => setAnsPart2({...ansPart2, [qNum]: {...ansPart2[qNum], [sub]: 'S'}})} className={`py-0.5 rounded font-bold text-[10px] ${ansPart2[qNum]?.[sub] === 'S' ? 'bg-rose-600 text-white' : 'bg-slate-800 text-slate-400'}`}>S</button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* PHẦN III */}
                        {p3Questions.length > 0 && (
                            <div className="mb-6">
                                <h4 className="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3">Phần III: Trả lời ngắn</h4>
                                <div className="space-y-2">
                                    {p3Questions.map((qNum) => {
                                        const isFlagged = flaggedQuestions[`p3_${qNum}`];
                                        return (
                                            <div key={qNum} className="flex items-center gap-2 bg-slate-800/40 p-2 rounded-xl border border-slate-700/50 relative">
                                                <button onClick={() => setFlaggedQuestions({...flaggedQuestions, [`p3_${qNum}`]: !isFlagged})} className={`absolute top-1 right-1 ${isFlagged ? 'text-amber-400' : 'text-slate-600'}`}><Icon name="flag" size={10} /></button>
                                                <span className="text-xs md:text-sm font-bold text-slate-500 w-12 text-center">C.{qNum}</span>
                                                <input type="text" value={ansPart3[qNum] || ''} onChange={(e) => setAnsPart3({...ansPart3, [qNum]: e.target.value})} className="flex-1 bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs md:text-sm text-white outline-none focus:border-emerald-500" placeholder="Đáp án..." />
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="p-4 bg-slate-900/50 border-t border-slate-800 flex items-center justify-between gap-4 shrink-0">
                        <button onClick={() => setIsMobileSheetOpen(false)} className="flex-1 md:hidden bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs uppercase tracking-wider flex items-center justify-center gap-2 text-slate-300"><Icon name="chevron-down" size={14}/>Đóng lại</button>
                        <button onClick={() => handleSubmit(false)} className="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold text-xs md:text-sm uppercase tracking-wider transition-colors shadow-lg shadow-indigo-600/20">Nộp bài làm</button>
                    </div>
                </aside>
            </div>
        </div>
    );
};

// --- 4. MÀN HÌNH KẾT QUẢ ---
const ResultView = ({ user, exam, resultData, leaderboard, onBackToLobby }) => {
    const cfg = exam.questions || {};
    const p1Questions = Array.from({length: cfg.num_p1 || 0}, (_, i) => i + 1);
    const p2Questions = Array.from({length: cfg.num_p2 || 0}, (_, i) => i + 1);
    const p3Questions = Array.from({length: cfg.num_p3 || 0}, (_, i) => i + 1);
    
    return (
        <div className="max-w-4xl mx-auto p-4 md:p-10 min-h-[100dvh] flex flex-col justify-between">
            <div>
                <header className="mb-8 border-b border-slate-800 pb-6 text-center">
                    <h1 className="text-2xl md:text-4xl font-black uppercase tracking-tight text-white mb-2">KẾT QUẢ BÀI LÀM</h1>
                    <p className="text-sm text-indigo-400 font-semibold uppercase">{exam.title}</p>
                </header>

                <div className="grid grid-cols-3 gap-2 md:gap-4 mb-8">
                    <div className="glass-panel p-4 rounded-xl text-center"><p className="text-xs text-slate-400 font-medium mb-1 uppercase">Điểm số</p><p className="text-xl md:text-3xl font-black text-indigo-400">{resultData.score}</p></div>
                    <div className="glass-panel p-4 rounded-xl text-center"><p className="text-xs text-slate-400 font-medium mb-1 uppercase">Tổng câu đúng</p><p className="text-xl md:text-3xl font-black text-emerald-400">{resultData.correct}</p></div>
                    <div className="glass-panel p-4 rounded-xl text-center"><p className="text-xs text-slate-400 font-medium mb-1 uppercase">Vi phạm</p><p className="text-xl md:text-3xl font-black text-rose-400">{resultData.cheat}</p></div>
                </div>

                {/* CHI TIẾT ĐÁP ÁN (Khách không được xem) */}
                {user.role === 'student' ? (
                    <div className="mt-8 border-t border-slate-800 pt-8">
                        <h3 className="text-xl font-bold mb-6 text-white uppercase tracking-tight flex items-center gap-2"><Icon name="check-square" className="text-indigo-400"/> Chi tiết đáp án</h3>
                        
                        {cfg.explain_link && (
                            <div className="mb-6 p-4 bg-emerald-950/20 border border-emerald-900/50 rounded-xl text-center">
                                <a href={cfg.explain_link} target="_blank" className="text-emerald-400 font-bold hover:underline flex items-center justify-center gap-2"><Icon name="check-circle" size={18}/> Xem File Lời Giải Chi Tiết Của Giáo Viên</a>
                            </div>
                        )}

                        <div className="space-y-6">
                            {/* PHẦN I */}
                            {p1Questions.length > 0 && (
                                <div>
                                    <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3">Phần I: Trắc nghiệm nhiều lựa chọn</h4>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                        {p1Questions.map((qNum) => {
                                            const sAns = resultData.details?.p1?.[qNum] || '_';
                                            const cAns = exam.answers?.p1?.[qNum] || '_';
                                            const isCorrect = String(sAns).toUpperCase() === String(cAns).toUpperCase();
                                            return (
                                                <div key={qNum} className={`p-3 rounded-xl border ${isCorrect ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'}`}>
                                                    <div className="font-bold text-xs mb-1">Câu {qNum}</div>
                                                    <div className="text-[11px] space-y-0.5">
                                                        <div>Chọn: <span className="font-bold">{sAns}</span></div>
                                                        <div>Đáp án: <span className="font-bold">{cAns}</span></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* PHẦN II */}
                            {p2Questions.length > 0 && (
                                <div>
                                    <h4 className="text-xs font-bold text-amber-400 uppercase tracking-wider mb-3">Phần II: Trắc nghiệm Đúng/Sai</h4>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {p2Questions.map((qNum) => {
                                            return (
                                                <div key={qNum} className="bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl">
                                                    <div className="font-bold text-sm mb-2 text-white">Câu {qNum}</div>
                                                    <div className="grid grid-cols-2 gap-2 text-xs">
                                                        {['a', 'b', 'c', 'd'].map(sub => {
                                                            const sAns = resultData.details?.p2?.[qNum]?.[sub] || '_';
                                                            const cAns = exam.answers?.p2?.[qNum]?.[sub] || '_';
                                                            const isCorrect = String(sAns).toUpperCase() === String(cAns).toUpperCase();
                                                            return (
                                                                <div key={sub} className={`p-2 rounded-lg flex justify-between items-center ${isCorrect ? 'bg-emerald-500/5 text-emerald-400' : 'bg-rose-500/5 text-rose-400'}`}>
                                                                    <span>Ý {sub}: Chọn <strong className="mx-0.5">{sAns}</strong> (Đúng: {cAns})</span>
                                                                    <Icon name={isCorrect ? "check" : "x"} size={14} />
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* PHẦN III */}
                            {p3Questions.length > 0 && (
                                <div>
                                    <h4 className="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3">Phần III: Trắc nghiệm trả lời ngắn</h4>
                                    <div className="space-y-3">
                                        {p3Questions.map((qNum) => {
                                            const sAns = resultData.details?.p3?.[qNum] || '';
                                            const cAns = exam.answers?.p3?.[qNum] || '';
                                            const isCorrect = String(sAns).trim().toLowerCase() === String(cAns).trim().toLowerCase();
                                            return (
                                                <div key={qNum} className={`p-3 rounded-xl border flex flex-col md:flex-row md:items-center justify-between gap-2 ${isCorrect ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'}`}>
                                                    <div className="font-bold text-xs">Câu {qNum}</div>
                                                    <div className="text-[11px] flex flex-wrap gap-x-4">
                                                        <div>Ghi: <span className="font-bold">{sAns || 'Bỏ trống'}</span></div>
                                                        <div>Đáp án: <span className="font-bold">{cAns}</span></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                ) : (
                    <div className="mt-8 border-t border-slate-800 pt-8 text-center text-slate-500 text-sm">
                        <Icon name="lock" size={32} className="mb-2 opacity-50" />
                        <p>Bạn đang thi bằng quyền Khách. Chi tiết đáp án chỉ hiển thị đối với Học viên chính thức.</p>
                    </div>
                )}
            </div>

            {/* BẢNG XẾP HẠNG */}
            <div className="mt-10 glass-panel p-6 rounded-2xl">
                <h3 className="text-lg font-bold mb-4 uppercase text-indigo-400 flex items-center gap-2"><Icon name="trophy" /> Bảng xếp hạng đề thi</h3>
                <div className="overflow-x-auto">
                    <table className="w-full text-left text-sm text-slate-300">
                        <thead>
                            <tr className="border-b border-slate-800 text-slate-400 text-xs uppercase font-semibold">
                                <th className="py-3 px-4">Hạng</th>
                                <th className="py-3 px-4">Họ và tên</th>
                                <th className="py-3 px-4">Lớp/Nhóm</th>
                                <th className="py-3 px-4 text-right">Điểm số</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-800/50">
                            {leaderboard.map((rankItem, index) => {
                                const isCurrentUser = rankItem.username === user.username && rankItem.name === user.name;
                                return (
                                    <tr key={index} className={`transition-colors ${isCurrentUser ? 'bg-indigo-600/10 text-indigo-300 font-medium' : 'hover:bg-slate-800/30'}`}>
                                        <td className="py-3 px-4">
                                            {index === 0 && <span className="text-amber-400 font-bold"> 🥇 1</span>}
                                            {index === 1 && <span className="text-slate-400 font-bold"> 🥈 2</span>}
                                            {index === 2 && <span className="text-amber-600 font-bold"> 🥉 3</span>}
                                            {index > 2 && `${index + 1}`}
                                        </td>
                                        <td className="py-3 px-4">
                                            <p className="text-sm truncate max-w-[120px] md:max-w-[200px]">{rankItem.name} {isCurrentUser && <span className="text-indigo-400 ml-1">(Bạn)</span>}</p>
                                        </td>
                                        <td className="py-3 px-4 text-xs text-slate-500 uppercase font-semibold">{rankItem.group}</td>
                                        <td className="py-3 px-4 text-right font-bold text-slate-100">{rankItem.score}</td>
                                    </tr>
                                );
                            })}
                            {leaderboard.length === 0 && <tr><td colSpan="4" className="py-8 text-center text-slate-500">Đang cập nhật xếp hạng...</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>

            <button onClick={onBackToLobby} className="w-full mt-8 bg-slate-800 hover:bg-slate-700 py-4 rounded-xl font-bold uppercase transition-colors tracking-wide flex items-center justify-center gap-2 border border-slate-700/50"><Icon name="arrow-left" size={16}/>Quay về phòng chờ</button>
            <FooterCredit />
        </div>
    );
};

// ==========================================
// APP MAIN BỌC GIAO DIỆN
// ==========================================
const App = () => {
    const [view, setView] = useState('auth');
    const [user, setUser] = useState(null);
    const [selectedExam, setSelectedExam] = useState(null);
    const [resultData, setResultData] = useState(null);
    const [leaderboard, setLeaderboard] = useState([]);

    const handleExamSubmit = async (studentAnswers, cheatCount, exam) => {
        // TÍNH ĐIỂM CHUẨN FORM 2025 BỘ GD&ĐT
        const cfg = exam.questions || {};
        const key = exam.answers || { p1: {}, p2: {}, p3: {} };
        
        let studentRawScore = 0;
        let correctP1 = 0, correctP2 = 0, correctP3 = 0;

        // Chấm P1 (0.25đ / câu)
        for(let i=1; i<=(cfg.num_p1 || 0); i++) {
            const sAns = studentAnswers.p1[i] || ''; const cAns = key.p1[i] || '';
            if (sAns && cAns && String(sAns).trim().toUpperCase() === String(cAns).trim().toUpperCase()) {
                studentRawScore += 0.25; correctP1++;
            }
        }
        // Chấm P2 (0.1, 0.25, 0.5, 1.0)
        for(let i=1; i<=(cfg.num_p2 || 0); i++) {
            let correctSubs = 0;
            ['a','b','c','d'].forEach(sub => {
                const sAns = studentAnswers.p2[i]?.[sub]; const cAns = key.p2?.[i]?.[sub];
                if (sAns && cAns && String(sAns).trim().toUpperCase() === String(cAns).trim().toUpperCase()) correctSubs++;
            });
            if(correctSubs===1) studentRawScore += 0.1;
            else if(correctSubs===2) studentRawScore += 0.25;
            else if(correctSubs===3) studentRawScore += 0.5;
            else if(correctSubs===4) { studentRawScore += 1.0; correctP2++; }
        }
        // Chấm P3 (0.5đ / câu)
        for(let i=1; i<=(cfg.num_p3 || 0); i++) {
            const sAns = studentAnswers.p3[i] || ''; const cAns = key.p3[i] || '';
            if (sAns && cAns && String(sAns).trim().toLowerCase() === String(cAns).trim().toLowerCase()) {
                studentRawScore += 0.5; correctP3++;
            }
        }

        const maxPossibleRawScore = ((cfg.num_p1 || 0) * 0.25) + ((cfg.num_p2 || 0) * 1.0) + ((cfg.num_p3 || 0) * 0.5);
        let finalScore = maxPossibleRawScore > 0 ? (studentRawScore / maxPossibleRawScore) * 10 : 0;
        finalScore = parseFloat(finalScore.toFixed(2));
        const totalCorrect = correctP1 + correctP2 + correctP3;

        const payload = {
            username: user.username, name: user.name, group: user.group,
            examTitle: exam.title, score: finalScore, correct: totalCorrect,
            cheat: `${cheatCount} lần`, details: studentAnswers
        };

        setResultData(payload);
        setView('result');

        try {
            await fetch(`${API_URL}?action=submit`, {
                method: 'POST', body: JSON.stringify(payload)
            });
            // Lấy lại bảng xếp hạng sau khi nộp
            const rankRes = await fetch(`${API_URL}?action=get_ranking&exam=${encodeURIComponent(exam.title)}`);
            const rankData = await rankRes.json();
            setLeaderboard(rankData);
        } catch (e) { console.error("Lỗi Nộp Bài:", e); }
    };

    return (
        <div className="min-h-[100dvh] w-full relative">
            {view === 'auth' && <AuthView onLoginSuccess={(u) => { setUser(u); setView('lobby'); }} setUser={setUser} setView={setView} />}
            {view === 'lobby' && <LobbyView user={user} onLogout={() => { setUser(null); setView('auth'); }} onSelectExam={(ex) => { setSelectedExam(ex); setView('exam'); }} />}
            {view === 'exam' && <ExamView user={user} exam={selectedExam} onExamSubmit={handleExamSubmit} />}
            {view === 'result' && <ResultView user={user} exam={selectedExam} resultData={resultData} leaderboard={leaderboard} onBackToLobby={() => setView('lobby')} />}
        </div>
    );
};

const rootElement = document.getElementById('root');
const root = ReactDOM.createRoot(rootElement);
root.render(<App />);
</script>
</body>
</html>
