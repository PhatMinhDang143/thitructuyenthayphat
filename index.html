 
  <!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HỆ THỐNG THI TRỰC TUYẾN - PRO MOBILE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        // Cấu hình Worker cho PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .timer-phase-1 { color: #38bdf8; }
        .timer-phase-2 { color: #fbbf24; }
        .timer-danger { color: #ef4444 !important; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .focus-active .sidebar-panel { display: none !important; }
        .focus-active .mobile-toggle-btn { display: none !important; }
        @media (max-width: 768px) {
            .sidebar-panel {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
                transform: translateY(100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                height: 85dvh;
                border-radius: 24px 24px 0 0;
                box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            }
            .sidebar-panel.sheet-open {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
const API_URL = "https://script.google.com/macros/s/AKfycbwl7gLGLcemZOI8DX6M472D7WpDOyawTF2Ih1Wk_Gqp5lRs69SYZRVcPXNkl4_Mox6f/exec";
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current, attrs: { width: size, height: size } });
                }
            }, [name, size]);
            return <span ref={iconRef} className={className}></span>;
        };

        // COMPONENT PDF VIEWER CHUYÊN DỤNG CHO MOBILE
// COMPONENT PDF VIEWER CHUYÊN DỤNG CHO MOBILE
const MobilePdfViewer = ({ url }) => {
    const containerRef = useRef(null);
    const [isLoading, setIsLoading] = useState(true);
    const [error, setError] = useState(false);
    
    // 1. Thêm biến state để quản lý mức độ zoom (mặc định 1 = 100%)
    const [zoom, setZoom] = useState(1);

    useEffect(() => {
        const renderPdf = async () => {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const container = containerRef.current;
                if (!container) return;

                container.innerHTML = ''; // Clear cũ
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.5 });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    canvas.className = 'w-full max-w-4xl mx-auto mb-4 bg-white rounded shadow-lg';
                    container.appendChild(canvas);
                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;
                }
                setIsLoading(false);
            } catch (err) {
                console.error('Lỗi tải PDF:', err);
                setIsLoading(false);
                setError(true);
            }
        };
        renderPdf();
    }, [url]);

    return (
        // 2. Sửa overflow-y-auto thành overflow-auto để cho phép cuộn ngang khi phóng to
        <div className="w-full h-full overflow-auto custom-scroll bg-[#1e1e1e] p-2 md:p-6 relative">
            
            {/* 3. THANH CÔNG CỤ ZOOM (chỉ hiển thị trên mobile nhờ class md:hidden) */}
            <div className="md:hidden sticky top-0 z-30 flex justify-center items-center gap-4 mb-4 bg-slate-900/90 backdrop-blur-md py-2 px-4 rounded-full w-max mx-auto shadow-[0_4px_20px_rgba(0,0,0,0.5)] border border-slate-700">
                <button onClick={() => setZoom(z => Math.max(0.5, z - 0.25))} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 transition-colors">
                    <Icon name="zoom-out" size={18}/>
                </button>
                <span className="text-white text-xs font-bold min-w-[45px] text-center">{Math.round(zoom * 100)}%</span>
                <button onClick={() => setZoom(z => Math.min(3, z + 0.25))} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 transition-colors">
                    <Icon name="zoom-in" size={18}/>
                </button>
            </div>

            {isLoading && (
                <div className="absolute inset-0 flex flex-col items-center justify-center text-indigo-400 font-bold z-10 bg-[#1e1e1e]">
                    <Icon name="loader" className="animate-spin mb-3" size={32}/>
                    <p>Đang trích xuất đề thi, vui lòng đợi...</p>
                </div>
            )}
            
            {error && (
                <div className="absolute inset-0 flex flex-col items-center justify-center text-rose-500 font-bold z-10 bg-[#1e1e1e]">
                    <Icon name="alert-triangle" size={32} className="mb-2"/>
                    <p>Lỗi: Không tìm thấy file đề thi hoặc file bị hỏng.</p>
                </div>
            )}
            
            {/* 4. Thêm style width dựa trên state zoom để co giãn khung chứa PDF */}
            <div 
                ref={containerRef} 
                className="flex flex-col origin-top transition-all duration-200 ease-out mx-auto"
                style={{ width: `${zoom * 100}%` }}
            ></div>
        </div>
    );
};
        const FooterCredit = () => (
            <div className="mt-8 text-center text-slate-500 text-xs md:text-sm w-full py-4 shrink-0">
                Bản quyền website thuộc về <strong className="text-indigo-400">Đặng Minh Phát</strong>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('auth');
            const [user, setUser] = useState(null);
            const [exams, setExams] = useState([]);
            const [selectedExam, setSelectedExam] = useState(null);
            
            const [isFocusMode, setIsFocusMode] = useState(false);
            const [isMobileSheetOpen, setIsMobileSheetOpen] = useState(false);
            
            const [phase, setPhase] = useState(1);
            const [timeLeft, setTimeLeft] = useState(0);
            const [cheatCount, setCheatCount] = useState(0);
            const [ansPart1, setAnsPart1] = useState({});
            const [ansPart2, setAnsPart2] = useState({});
            const [ansPart3, setAnsPart3] = useState({});
            const [flaggedQuestions, setFlaggedQuestions] = useState({});
            const [finalResult, setFinalResult] = useState(null);
            const [leaderboard, setLeaderboard] = useState([]);

            useEffect(() => {
    fetch(`${API_URL}?action=get_exams`)
    .then(res => res.json())
    .then(data => { if (data.exams) setExams(data.exams); })
    .catch(err => console.error("Lỗi:", err));
}, []);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (view === 'exam' && document.hidden) setCheatCount(prev => prev + 1);
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [view]);

            useEffect(() => {
                let timerInterval;
                if (view === 'exam' && timeLeft > 0) {
                    timerInterval = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (view === 'exam' && timeLeft === 0) {
                    if (phase === 1) {
                        setPhase(2); setTimeLeft(5400);
                    } else {
                        submitExam();
                    }
                }
                return () => clearInterval(timerInterval);
            }, [view, timeLeft, phase]);

const submitExam = async () => {
    const offP1 = selectedExam.answers?.p1 || {};
    const offP2 = selectedExam.answers?.p2 || {};
    const offP3 = selectedExam.answers?.p3 || {};

    // 1. Tự động đếm tổng số câu thực tế của từng phần trong đề thi hiện tại
    const totalP1 = Object.keys(offP1).length;
    const totalP2 = Object.keys(offP2).length;
    const totalP3 = Object.keys(offP3).length;

    let studentRawScore = 0; // Tổng điểm thô học sinh đạt được
    let correctP1 = 0;
    let correctP2 = 0;
    let correctP3 = 0;

    // --- CHẤM ĐIỂM PHẦN I (Mỗi câu đúng tính 0.25 điểm thô) ---
    Object.keys(offP1).forEach(qNum => {
        if (ansPart1[qNum] && offP1[qNum] && String(ansPart1[qNum]).trim().toUpperCase() === String(offP1[qNum]).trim().toUpperCase()) {
            studentRawScore += 0.25;
            correctP1++;
        }
    });

    // --- CHẤM ĐIỂM PHẦN II (Tối đa 1.0 điểm thô cho 1 câu đúng trọn vẹn 4 ý) ---
    Object.keys(offP2).forEach(qNum => {
        let correctSubs = 0;
        ['a', 'b', 'c', 'd'].forEach(sub => {
            const sAns = ansPart2[qNum]?.[sub];
            const cAns = offP2[qNum]?.[sub];
            if (sAns && cAns && String(sAns).trim().toUpperCase() === String(cAns).trim().toUpperCase()) {
                correctSubs++;
            }
        });
        // Tỷ lệ cộng điểm thô theo số ý đúng của Bộ GD&ĐT
        if (correctSubs === 1) studentRawScore += 0.1;
        else if (correctSubs === 2) studentRawScore += 0.25;
        else if (correctSubs === 3) studentRawScore += 0.5;
        else if (correctSubs === 4) {
            studentRawScore += 1.0;
            correctP2++; // Đếm câu đúng trọn vẹn phần II
        }
    });

    // --- CHẤM ĐIỂM PHẦN III (Mỗi câu đúng tính 0.5 điểm thô) ---
    Object.keys(offP3).forEach(qNum => {
        const sAns = ansPart3[qNum];
        const cAns = offP3[qNum];
        if (sAns && cAns && String(sAns).trim().toLowerCase() === String(cAns).trim().toLowerCase()) {
            studentRawScore += 0.5;
            correctP3++;
        }
    });

    // 2. TÍNH TỔNG ĐIỂM THÔ TỐI ĐA MÀ ĐỀ NÀY CÓ THỂ ĐẠT ĐƯỢC
    const maxPossibleRawScore = (totalP1 * 0.25) + (totalP2 * 1.0) + (totalP3 * 0.5);

    // 3. QUY ĐỔI ĐỘNG VỀ THANG ĐIỂM 10 CỐ ĐỊNH
    let finalScore = 0;
    if (maxPossibleRawScore > 0) {
        finalScore = (studentRawScore / maxPossibleRawScore) * 10;
    }
    
    // Làm tròn lấy 2 chữ số thập phân (Ví dụ: 7.33, 8.5, 10.0...)
    finalScore = parseFloat(finalScore.toFixed(2)); 

    // Tính tổng số câu đúng thực tế trên toàn bộ bài thi để lưu lịch sử
    const totalCorrect = correctP1 + correctP2 + correctP3;

    const payload = {
        name: user.name,
        role: user.role,
        username: user.username,
        group: user.group || 'Khách',
        examTitle: selectedExam.title,
        score: finalScore,        // Điểm số đã quy đổi chuẩn về thang 10
        correct: totalCorrect,    // Lưu tổng số câu đúng
        cheat: cheatCount,
        details: { part1: ansPart1, part2: ansPart2, part3: ansPart3 }
    };

    // Gửi kết quả lên server lưu trữ qua API
    await fetch(`${API_URL}?action=submit`, { method: 'POST', body: JSON.stringify(payload) });
try {
    const rankRes = await fetch(`${API_URL}?action=get_ranking&exam=${encodeURIComponent(selectedExam.title)}`);
    const rankData = await rankRes.json();
    setLeaderboard(rankData);
} catch(e) {}
    setFinalResult(payload);
    setView('result');
};            const handleStartExam = (exam) => {
                setSelectedExam(exam); setPhase(1); setTimeLeft(300); setView('exam');
            };

            const renderAuthView = () => (
                <div className="min-h-[100dvh] flex flex-col items-center justify-center p-4 md:p-6 bg-slate-900">
                    <div className="w-full max-w-5xl grid md:grid-cols-2 gap-6 md:gap-8 flex-1 content-center">
                        <div className="glass-panel p-6 md:p-10 rounded-[2rem] shadow-2xl border-t-4 border-indigo-500">
                            <h2 className="text-2xl md:text-3xl font-bold mb-2 uppercase text-white">ĐĂNG NHẬP TÀI KHOẢN</h2>
                            <p className="text-slate-400 mb-6 md:mb-8 text-sm">Liên hệ thầy Phát nếu chưa có tài khoản</p>
                           <form onSubmit={async (e) => {
e.preventDefault();
const res = await fetch(`${API_URL}?action=login`, {
    method: 'POST', body: JSON.stringify({username: e.target.u.value, password: e.target.p.value})
}).then(r => r.json());
if(res.success) { setUser({name: res.name, group: res.group, role: 'student', username: res.username}); setView('lobby'); }
else alert(res.message);
}} className="space-y-4 md:space-y-5">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-300 mb-2">Tài khoản</label>
                                    <input name="u" required className="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-indigo-500 text-white" placeholder="Nhập mã..." />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-300 mb-2">Mật khẩu</label>
                                    <input name="p" type="password" required className="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-indigo-500 text-white" placeholder="Nhập mật khẩu..." />
                                </div>
                                <button className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold uppercase tracking-wider transition-colors mt-2">Vào hệ thống</button>
                            </form>
                        </div>
                        <div className="glass-panel p-6 md:p-10 rounded-[2rem] flex flex-col justify-center items-center text-center border-t-4 border-slate-600 mt-6 md:mt-0">
                            <div className="bg-slate-800 p-5 rounded-full mb-4 md:mb-6"><Icon name="users" size={32} className="text-slate-400" /></div>
                            <h2 className="text-xl md:text-2xl font-bold mb-3 uppercase text-white">Thi thử tự do</h2>
                            <p className="text-slate-400 text-sm mb-6 md:mb-8 px-4">Dành cho khách. Khách sẽ KHÔNG xem được chi tiết đáp án sau khi nộp bài.</p>
                            <button onClick={() => {setUser({name: 'Khách ' + Math.floor(Math.random() * 9999), role: 'guest'});
                            setView('lobby');}} className="w-full border-2 border-slate-600 hover:border-slate-400 hover:bg-slate-800 py-4 rounded-xl font-bold uppercase transition-all">Bắt đầu như Khách</button>
                        </div>
                    </div>
                    <FooterCredit />
                </div>
            );

            const renderLobbyView = () => (
                <div className="max-w-6xl mx-auto p-4 md:p-10 min-h-[100dvh] flex flex-col">
                    <header className="flex justify-between items-center mb-8 border-b border-slate-800 pb-6 pt-4">
                        <div>
                            <p className="text-indigo-400 font-semibold mb-1 text-sm md:text-base">Ây dô {user.name} đã chịu vào đây làm đề rồi à =))</p>
                            <h1 className="text-2xl md:text-4xl font-extrabold uppercase tracking-tight text-white">Danh sách đề thi</h1>
                        </div>
                        <button onClick={() => window.location.reload()} className="flex items-center gap-2 p-3 md:px-6 md:py-3 bg-slate-800 hover:bg-rose-600/20 hover:text-rose-500 rounded-xl font-semibold transition-colors">
                            <Icon name="log-out" size={18}/><span className="hidden md:inline">Đăng xuất</span>
                        </button>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-1 content-start">
                        {exams.length > 0 ? exams.map(exam => {
                            const p1Len = Object.keys(exam.answers?.p1 || {}).length;
                            const p2Len = Object.keys(exam.answers?.p2 || {}).length;
                            const p3Len = Object.keys(exam.answers?.p3 || {}).length;
                            return (
                                <div key={exam.id} className="glass-panel p-6 md:p-8 rounded-2xl flex flex-col justify-between hover:border-indigo-500 transition-colors group">
                                    <div>
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="bg-slate-800 px-3 py-1 rounded text-xs font-bold text-slate-300">CẤU TRÚC {p1Len}-{p2Len}-{p3Len}</div>
                                            <Icon name="file-text" className="text-slate-500" />
                                        </div>
                                        <h3 className="text-lg md:text-xl font-bold mb-4 text-white uppercase">{exam.title}</h3>
                                        <p className="text-sm text-slate-400 mb-8">Thời gian: <strong className="text-white">90 phút</strong></p>
                                    </div>
                                    <button onClick={() => handleStartExam(exam)} className="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold text-sm uppercase transition-colors">Vào thi ngay</button>
                                </div>
                            );
                        }) : (<div className="col-span-full text-center py-20 text-slate-500">Chưa có đề thi nào.</div>)}
                    </div>
                    <FooterCredit />
                </div>
            );

            const renderExamView = () => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = String(timeLeft % 60).padStart(2, '0');
                const isDanger = phase === 2 && timeLeft < 300;

                const p1Questions = Object.keys(selectedExam.answers?.p1 || {}).map(Number).sort((a, b) => a - b);
                const p2Questions = Object.keys(selectedExam.answers?.p2 || {}).map(Number).sort((a, b) => a - b);
                const p3Questions = Object.keys(selectedExam.answers?.p3 || {}).map(Number).sort((a, b) => a - b);

                return (
                    <div className={`h-[100dvh] flex flex-col ${isFocusMode ? 'focus-active' : ''}`}>
                        <header className="h-14 md:h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-3 md:px-6 shrink-0 z-50">
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={() => setIsFocusMode(!isFocusMode)} className={`p-2 rounded-lg ${isFocusMode ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400'}`}><Icon name={isFocusMode ? "minimize" : "maximize"} size={18}/></button>
                                <span className="font-bold text-xs md:text-sm text-indigo-400 hidden sm:inline-block uppercase truncate max-w-[150px] md:max-w-xs">{selectedExam.title}</span>
                            </div>
                            
                            <div className="flex flex-col items-center justify-center bg-slate-800/50 border border-slate-700/50 px-4 py-1 rounded-xl min-w-[100px]">
                                <p className="text-[9px] uppercase tracking-wider text-slate-400 font-semibold">{phase === 1 ? 'Điền thông tin' : 'Thời gian làm bài'}</p>
                                <p className={`text-sm md:text-base font-black font-mono tracking-tight ${isDanger ? 'timer-danger' : (phase === 1 ? 'timer-phase-1' : 'timer-phase-2')}`}>{minutes}:{seconds}</p>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                <div className="text-right hidden md:block">
                                    <p className="text-xs font-bold text-slate-200">{user.name}</p>
                                    <p className="text-[10px] text-indigo-400 uppercase font-semibold tracking-wider">{user.group || 'Khách'}</p>
                                </div>
                                <div className="bg-gradient-to-tr from-indigo-600 to-violet-500 p-2 rounded-xl shadow-lg shadow-indigo-600/20"><Icon name="user" size={16} className="text-white" /></div>
                            </div>
                        </header>
                        
                        <div className="flex-1 flex overflow-hidden relative">

                            {/* BÊN TRÁI: ĐỀ THI PDF */}
<div className="flex-1 h-full w-full relative z-10">
    <MobilePdfViewer url={`uploads/${selectedExam.file}`} />
    
    {/* Bổ sung nút nổi bật cho mobile ở góc dưới bên phải */}
    {!isMobileSheetOpen && (
        <button 
            onClick={() => setIsMobileSheetOpen(true)} 
            className="mobile-toggle-btn md:hidden absolute bottom-6 right-6 z-40 bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-full shadow-[0_4px_20px_rgba(79,70,229,0.5)] font-bold flex items-center gap-2 transition-all"
        >
            <Icon name="edit-3" size={18}/> Điền đáp án
        </button>
    )}
</div>
                            {/* BÊN PHẢI: BẢNG ĐÁP ÁN (SIDEBAR) */}
                            <aside className={`sidebar-panel w-80 xl:w-90 bg-slate-900 border-l border-slate-800 flex flex-col h-full shrink-0 ${isMobileSheetOpen ? 'sheet-open' : ''}`}>
                                <div className="p-4 border-b border-slate-800 flex items-center justify-between shrink-0 bg-slate-900/50">
                                    <div className="flex items-center gap-2">
                                        <Icon name="clipboard-list" className="text-indigo-400" />
                                        <h3 className="font-bold text-sm uppercase tracking-wider text-slate-200">Phiếu bài làm</h3>
                                    </div>
                                    <button onClick={() => setIsMobileSheetOpen(false)} className="md:hidden p-2 text-slate-400 hover:text-white bg-slate-800 rounded-lg"><Icon name="x" size={16}/></button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-4 custom-scroll space-y-6 pb-24 md:pb-6">
                                    {/* PHẦN I */}
                                    {p1Questions.length > 0 && (
                                        <div className="mb-6">
                                            <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3">Phần I: Trắc nghiệm nhiều lựa chọn</h4>
                                            <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-4 xl:grid-cols-5 gap-2">
                                                {p1Questions.map((qNum) => {
                                                    const isFlagged = flaggedQuestions[`p1_${qNum}`];
                                                    return (
                                                        <div key={qNum} className="relative flex flex-col items-center p-2 bg-slate-800/40 rounded-xl border border-slate-700/50">
                                                            <button onClick={() => setFlaggedQuestions({...flaggedQuestions, [`p1_${qNum}`]: !isFlagged})} className={`absolute top-1 right-1 ${isFlagged ? 'text-amber-400' : 'text-slate-600 hover:text-slate-400'}`}><Icon name="flag" size={10} /></button>
                                                            <span className="text-[10px] font-bold text-slate-500 mb-1">C.{qNum}</span>
                                                            <div className="flex flex-col gap-1 w-full">
                                                                {['A', 'B', 'C', 'D'].map(ans => (
                                                                    <button key={ans} onClick={() => setAnsPart1({...ansPart1, [qNum]: ans})} className={`py-1 rounded text-xs font-bold transition-all ${ansPart1[qNum] === ans ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{ans}</button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* PHẦN II */}
                                    {p2Questions.length > 0 && (
                                        <div className="mb-6">
                                            <h4 className="text-xs font-bold text-amber-400 uppercase tracking-wider mb-3">Phần II: Trắc nghiệm Đúng/Sai</h4>
                                            <div className="space-y-3">
                                                {p2Questions.map((qNum) => {
                                                    const isFlagged = flaggedQuestions[`p2_${qNum}`];
                                                    return (
                                                        <div key={qNum} className="p-3 bg-slate-800/40 rounded-xl border border-slate-700/50 relative">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <span className="text-xs font-bold text-slate-400">Câu {qNum}</span>
                                                                <button onClick={() => setFlaggedQuestions({...flaggedQuestions, [`p2_${qNum}`]: !isFlagged})} className={`${isFlagged ? 'text-amber-400' : 'text-slate-600'}`}><Icon name="flag" size={12} /></button>
                                                            </div>
                                                            <div className="grid grid-cols-4 gap-2 text-center text-[10px] text-slate-500 font-semibold mb-1">
                                                                <div>Ý a</div><div>Ý b</div><div>Ý c</div><div>Ý d</div>
                                                            </div>
                                                            <div className="grid grid-cols-4 gap-2">
                                                                {['a', 'b', 'c', 'd'].map(sub => (
                                                                    <div key={sub} className="flex flex-col gap-1 bg-slate-900/40 p-1 rounded-lg">
                                                                        <button onClick={() => setAnsPart2({...ansPart2, [qNum]: {...ansPart2[qNum], [sub]: 'Đ'}})} className={`py-0.5 rounded font-bold text-[10px] ${ansPart2[qNum]?.[sub] === 'Đ' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400'}`}>Đ</button>
                                                                        <button onClick={() => setAnsPart2({...ansPart2, [qNum]: {...ansPart2[qNum], [sub]: 'S'}})} className={`py-0.5 rounded font-bold text-[10px] ${ansPart2[qNum]?.[sub] === 'S' ? 'bg-rose-600 text-white' : 'bg-slate-800 text-slate-400'}`}>S</button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* PHẦN III */}
                                    {p3Questions.length > 0 && (
                                        <div className="mb-6">
                                            <h4 className="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3">Phần III: Trắc nghiệm trả lời ngắn</h4>
                                            <div className="space-y-2">
                                                {p3Questions.map((qNum) => {
                                                    const isFlagged = flaggedQuestions[`p3_${qNum}`];
                                                    return (
                                                        <div key={qNum} className="flex items-center gap-2 bg-slate-800/40 p-2 rounded-xl border border-slate-700/50 relative">
                                                            <button onClick={() => setFlaggedQuestions({...flaggedQuestions, [`p3_${qNum}`]: !isFlagged})} className={`absolute top-1 right-1 ${isFlagged ? 'text-amber-400' : 'text-slate-600'}`}><Icon name="flag" size={10} /></button>
                                                            <span className="text-xs md:text-sm font-bold text-slate-500 w-12 text-center">C.{qNum}</span>
                                                            <input type="text" value={ansPart3[qNum] || ''} onChange={(e) => setAnsPart3({...ansPart3, [qNum]: e.target.value})} className="flex-1 bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs md:text-sm text-white outline-none focus:border-emerald-500" placeholder="Đáp án..." />
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 bg-slate-900/50 border-t border-slate-800 flex items-center justify-between gap-4 shrink-0">
    <button onClick={() => setIsMobileSheetOpen(false)} className="flex-1 md:hidden bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-xs uppercase tracking-wider flex items-center justify-center gap-2 text-slate-300"><Icon name="chevron-down" size={14}/>Đóng lại</button>
    <button onClick={() => { if(confirm('Bạn có chắc chắn muốn nộp bài?')) submitExam(); }} className="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold text-xs md:text-sm uppercase tracking-wider transition-colors shadow-lg shadow-indigo-600/20">Nộp bài làm</button>
</div>
                            </aside>
                        </div>
                    </div>
                );
            };

            const renderResultView = () => {
                const p1Correct = finalResult.correct;
                const totalP1 = Object.keys(selectedExam.answers?.p1 || {}).length;

                const p1Questions = Object.keys(selectedExam.answers?.p1 || {}).map(Number).sort((a, b) => a - b);
                const p2Questions = Object.keys(selectedExam.answers?.p2 || {}).map(Number).sort((a, b) => a - b);
                const p3Questions = Object.keys(selectedExam.answers?.p3 || {}).map(Number).sort((a, b) => a - b);

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-10 min-h-[100dvh] flex flex-col justify-between">
                        <div>
                            <header className="mb-8 border-b border-slate-800 pb-6 text-center">
                                <h1 className="text-2xl md:text-4xl font-black uppercase tracking-tight text-white mb-2">KẾT QUẢ BÀI LÀM</h1>
                                <p className="text-sm text-indigo-400 font-semibold uppercase">{selectedExam.title}</p>
                            </header>
                            
                            <div className="grid grid-cols-3 gap-2 md:gap-4 mb-8">
                                <div className="glass-panel p-4 rounded-xl text-center"><p className="text-xs text-slate-400 font-medium mb-1 uppercase">Điểm số</p><p className="text-xl md:text-3xl font-black text-indigo-400">{finalResult.score}</p></div>
                                <div className="glass-panel p-4 rounded-xl text-center"><p className="text-xs text-slate-400 font-medium mb-1 uppercase">Đúng Phần I</p><p className="text-xl md:text-3xl font-black text-emerald-400">{p1Correct}/{totalP1}</p></div>
                                <div className="glass-panel p-4 rounded-xl text-center"><p className="text-xs text-slate-400 font-medium mb-1 uppercase">Vi phạm</p><p className="text-xl md:text-3xl font-black text-rose-400">{finalResult.cheat} lần</p></div>
                            </div>
                            
                            {/* CHI TIẾT ĐÁP ÁN - CHỈ SINH VIÊN ĐƯỢC XEM */}
                            {user.role === 'student' ? (
                                <div className="mt-8 border-t border-slate-800 pt-8">
                                    <h3 className="text-xl font-bold mb-6 text-white uppercase tracking-tight flex items-center gap-2"><Icon name="check-square" className="text-indigo-400"/> Chi tiết đáp án</h3>
                                    
                                    <div className="space-y-6">
                                        {/* PHẦN I */}
                                        {p1Questions.length > 0 && (
                                            <div>
                                                <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3">Phần I: Trắc nghiệm nhiều lựa chọn</h4>
                                                <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                                    {p1Questions.map((qNum) => {
                                                        const sAns = finalResult.details?.part1?.[qNum] || ' Chưa làm';
                                                        const cAns = selectedExam.answers?.p1?.[qNum];
                                                        const isCorrect = sAns === cAns;
                                                        return (
                                                            <div key={qNum} className={`p-3 rounded-xl border ${isCorrect ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'}`}>
                                                                <div className="font-bold text-xs mb-1">Câu {qNum}</div>
                                                                <div className="text-[11px] space-y-0.5">
                                                                    <div>Chọn: <span className="font-bold">{sAns}</span></div>
                                                                    <div>Đáp án: <span className="font-bold">{cAns}</span></div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {/* PHẦN II */}
                                        {p2Questions.length > 0 && (
                                            <div>
                                                <h4 className="text-xs font-bold text-amber-400 uppercase tracking-wider mb-3">Phần II: Trắc nghiệm Đúng/Sai</h4>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {p2Questions.map((qNum) => {
                                                        return (
                                                            <div key={qNum} className="bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl">
                                                                <div className="font-bold text-sm mb-2 text-white">Câu {qNum}</div>
                                                                <div className="grid grid-cols-2 gap-2 text-xs">
                                                                    {['a', 'b', 'c', 'd'].map(sub => {
                                                                        const sAns = finalResult.details?.part2?.[qNum]?.[sub] || '_';
                                                                        const cAns = selectedExam.answers?.p2?.[qNum]?.[sub] || '_';
                                                                        const isCorrect = sAns === cAns;
                                                                        return (
                                                                            <div key={sub} className={`p-2 rounded-lg flex justify-between items-center ${isCorrect ? 'bg-emerald-500/5 text-emerald-400' : 'bg-rose-500/5 text-rose-400'}`}>
                                                                                <span>Ý {sub}: Chọn <strong className="mx-0.5">{sAns}</strong> (Đúng: {cAns})</span>
                                                                                <Icon name={isCorrect ? "check" : "x"} size={14} />
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {/* PHẦN III */}
                                        {p3Questions.length > 0 && (
                                            <div>
                                                <h4 className="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3">Phần III: Trắc nghiệm trả lời ngắn</h4>
                                                <div className="space-y-3">
                                                    {p3Questions.map((qNum) => {
                                                        const sAns = finalResult.details?.part3?.[qNum] || '';
                                                        const cAns = selectedExam.answers?.p3?.[qNum] || '';
                                                        const isCorrect = String(sAns).trim().toLowerCase() === String(cAns).trim().toLowerCase();
                                                        return (
                                                            <div key={qNum} className={`p-3 rounded-xl border flex flex-col md:flex-row md:items-center justify-between gap-2 ${isCorrect ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'}`}>
                                                                <div className="font-bold text-xs">Câu {qNum}</div>
                                                                <div className="text-[11px] flex flex-wrap gap-x-4">
                                                                    <div>Ghi: <span className="font-bold">{sAns || 'Bỏ trống'}</span></div>
                                                                    <div>Đáp án: <span className="font-bold">{cAns}</span></div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : null}
                        </div>
                        
                        {/* BẢNG XẾP HẠNG TRONG PHẦN KẾT QUẢ */}
                        <div className="mt-10 glass-panel p-6 rounded-2xl">
                            <h3 className="text-lg font-bold mb-4 uppercase text-indigo-400 flex items-center gap-2"><Icon name="trophy" /> Bảng xếp hạng đề thi</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm text-slate-300">
                                    <thead>
                                        <tr className="border-b border-slate-800 text-slate-400 text-xs uppercase font-semibold">
                                            <th className="py-3 px-4">Hạng</th>
                                            <th className="py-3 px-4">Họ và tên</th>
                                            <th className="py-3 px-4">Lớp/Nhóm</th>
                                            <th className="py-3 px-4 text-right">Điểm số</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/50">
                                        {leaderboard.map((rankItem, index) => {
                                            const isCurrentUser = rankItem.username === user.username && rankItem.name === user.name;
                                            return (
                                                <tr key={index} className={`transition-colors ${isCurrentUser ? 'bg-indigo-600/10 text-indigo-300 font-medium' : 'hover:bg-slate-800/30'}`}>
                                                    <td className="py-3 px-4">
                                                        {index === 0 && <span className="text-amber-400 font-bold">🥇 1</span>}
                                                        {index === 1 && <span className="text-slate-400 font-bold">🥈 2</span>}
                                                        {index === 2 && <span className="text-amber-600 font-bold">🥉 3</span>}
                                                        {index > 2 && `${index + 1}`}
                                                    </td>
                                                    <td className="py-3 px-4">
                                                        <div className="flex items-center gap-2">
                                                            <p className="text-sm truncate max-w-[120px] md:max-w-[200px]">{rankItem.name} {isCurrentUser && <span className="text-indigo-400 ml-1">(Bạn)</span>}</p>
                                                        </div>
                                                    </td>
                                                    <td className="py-3 px-4 text-xs text-slate-500 uppercase font-semibold">{rankItem.group}</td>
                                                    <td className="py-3 px-4 text-right font-bold text-slate-100">{rankItem.score}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        
                        <button onClick={() => setView('lobby')} className="w-full mt-8 bg-slate-800 hover:bg-slate-700 py-4 rounded-xl font-bold uppercase transition-colors tracking-wide flex items-center justify-center gap-2 border border-slate-700/50"><Icon name="arrow-left" size={16}/>Quay về phòng chờ</button>
                        <FooterCredit />
                    </div>
                );
            };

            return (
                <div className="min-h-[100dvh] bg-[#0b0f19] text-slate-100 selection:bg-indigo-500/30">
                    {view === 'auth' && renderAuthView()}
                    {view === 'lobby' && renderLobbyView()}
                    {view === 'exam' && renderExamView()}
                    {view === 'result' && renderResultView()}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
