<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HỆ THỐNG QUẢN TRỊ ADMIN - HIGH TECH PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030712; color: #f3f4f6; overflow: hidden; margin: 0; }
.custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.6); }
.custom-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
.custom-scroll::-webkit-scrollbar-thumb:hover { background: #4b5563; }
.cyber-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
.glow-card:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.4); }
.glow-input:focus { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
.material-icons { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
</style>
<script>
// NHỚ DÁN LẠI ĐƯỜNG LINK WEB APP MỚI CỦA BẠN VÀO ĐÂY SAU KHI TRIỂN KHAI PHIÊN BẢN MỚI NHÉ
const API_URL = "https://script.google.com/macros/s/AKfycbyVERzEfEK7t_Hp6PpWZYodTN-o7t4omX6W69p2Hn7URj71agiiKgvs_b954aiNMfn_/exec";
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-plugins="transform-react-jsx">
const { useState, useEffect, useRef } = React;

const Icon = ({ name, size = 20, className = "" }) => {
    const iconMap = {
        'fingerprint': 'fingerprint', 'component': 'settings_input_component', 'layout-dashboard': 'dashboard',
        'file-spreadsheet': 'assignment', 'shield-check': 'verified_user', 'activity': 'assessment',
        'power': 'power_settings_new', 'file-text': 'description', 'check-circle': 'check_circle',
        'users': 'people', 'shield': 'security', 'award': 'emoji_events', 'trending-up': 'trending_up',
        'file-plus': 'note_add', 'timer': 'timer', 'file-check': 'fact_check', 'upload-cloud': 'cloud_upload',
        'save': 'save', 'clock': 'schedule', 'zap': 'bolt', 'file-x': 'text_snippet', 'edit': 'edit',
        'trash-2': 'delete_forever', 'user-plus': 'person_add', 'trash': 'delete', 'loader': 'hourglass_empty'
    };
    const matName = iconMap[name] || 'help';
    return <span className={`material-icons ${className}`} style={{ fontSize: size }}>{matName}</span>;
};

// --- 1. COMPONENT TRANG CHỦ DASHBOARD ---
const DashboardView = ({ data }) => (
    <div className="space-y-8 animate-fade-in">
        <div className="border-b border-slate-800 pb-4">
            <h1 className="text-3xl font-extrabold text-white tracking-tight">Hệ Thống Tổng Quan</h1>
            <p className="text-sm text-slate-400 mt-1">Dữ liệu phân tích hoạt động thi trực tuyến thời gian thực (Google Sheets).</p>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-gradient-to-br from-indigo-950 via-indigo-900 to-slate-900 p-8 rounded-2xl border border-indigo-500/20 shadow-xl relative overflow-hidden group hover:scale-[1.02] transition-transform duration-300">
                <Icon name="file-text" size={120} className="absolute -right-8 -bottom-8 opacity-10 text-indigo-400" />
                <h3 className="text-indigo-300 font-bold uppercase tracking-wider text-xs mb-2">Kho Đề Thi Hiện Có</h3>
                <p className="text-6xl font-black text-white">{data.exams ? data.exams.length : 0}</p>
            </div>
            <div className="bg-gradient-to-br from-cyan-950 via-cyan-900 to-slate-900 p-8 rounded-2xl border border-cyan-500/20 shadow-xl relative overflow-hidden group hover:scale-[1.02] transition-transform duration-300">
                <Icon name="users" size={120} className="absolute -right-8 -bottom-8 opacity-10 text-cyan-400" />
                <h3 className="text-cyan-300 font-bold uppercase tracking-wider text-xs mb-2">Học Viên Hệ Thống</h3>
                <p className="text-6xl font-black text-white">{data.students ? Object.keys(data.students).length : 0}</p>
            </div>
            <div className="bg-gradient-to-br from-emerald-950 via-emerald-900 to-slate-900 p-8 rounded-2xl border border-emerald-500/20 shadow-xl relative overflow-hidden group hover:scale-[1.02] transition-transform duration-300">
                <Icon name="award" size={120} className="absolute -right-8 -bottom-8 opacity-10 text-emerald-400" />
                <h3 className="text-emerald-300 font-bold uppercase tracking-wider text-xs mb-2">Tổng Lượt Khảo Sát</h3>
                <p className="text-6xl font-black text-white">{data.history ? data.history.length : 0}</p>
            </div>
        </div>
    </div>
);

// --- 2. COMPONENT ĐA DẠNG HÓA HÌNH THỨC & TẠO ĐỀ THI ---
const ExamForm = ({ initialData, onSave, onCancel }) => {
    const [title, setTitle] = useState(initialData?.title || '');
    const [time, setTime] = useState(initialData?.duration || 90);
    const [numP1, setNumP1] = useState(initialData?.num_p1 ?? 12);
    const [isSaving, setIsSaving] = useState(false);
    const [ansP1, setAnsP1] = useState(initialData?.questions ? Object.keys(initialData.questions).reduce((acc, cur) => ({...acc, [cur]: initialData.answers[cur] || ''}), {}) : {});

    const handleSubmit = async (e) => {
        e.preventDefault();
        if(!title.trim()) { alert("Vui lòng nhập tiêu đề!"); return; }

        setIsSaving(true);
        const mockQuestions = {};
        const finalAnswers = {};
        
        for(let i = 1; i <= numP1; i++) {
            mockQuestions[i] = { text: `Câu hỏi số ${i}: Lựa chọn đáp án đúng nhất.`, optA: "Đáp án A", optB: "Đáp án B", optC: "Đáp án C", optD: "Đáp án D" };
            finalAnswers[i] = ansP1[i] || '';
        }

        const payload = {
            id: initialData?.id || 'ex_' + Date.now(),
            title: title,
            duration: parseInt(time),
            questions: mockQuestions,
            answers: finalAnswers
        };

        await onSave(payload);
        setIsSaving(false);
    };

    return (
        <form onSubmit={handleSubmit} className="cyber-panel p-6 md:p-8 rounded-2xl shadow-2xl border border-slate-800 animate-fade-in">
            <div className="flex justify-between items-center border-b border-slate-800 pb-5 mb-6">
                <div>
                    <h2 className="text-2xl font-bold text-white flex items-center gap-2">
                        <Icon name="file-plus" className="text-indigo-500" />
                        {initialData ? 'Cập Nhật Cấu Trúc Đề Thi' : 'Thiết Lập Đề Thi Mới'}
                    </h2>
                </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-4 space-y-5">
                    <div className="bg-slate-900/40 p-5 rounded-xl border border-slate-800/80 space-y-4">
                        <h3 className="text-xs font-bold text-indigo-400 uppercase tracking-widest border-b border-slate-800 pb-2">1. Thông tin chung</h3>
                        <div>
                            <label className="block text-slate-400 text-xs font-semibold mb-2 uppercase">Tiêu đề đề thi</label>
                            <input value={title} onChange={e => setTitle(e.target.value)} required className="w-full p-3.5 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:border-indigo-500 glow-input transition-all font-medium text-sm" />
                        </div>
                        <div>
                            <label className="block text-slate-400 text-xs font-semibold mb-2 uppercase">Thời gian làm bài (Phút)</label>
                            <input type="number" value={time} onChange={e => setTime(e.target.value)} required className="w-full p-3.5 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:border-indigo-500 glow-input transition-all font-medium text-sm" />
                        </div>
                        <div>
                            <label className="block text-slate-400 text-xs font-semibold mb-2 uppercase">Số lượng câu hỏi</label>
                            <input type="number" min="1" max="100" value={numP1} onChange={e => setNumP1(parseInt(e.target.value) || 1)} className="w-full p-3.5 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:border-cyan-500 text-sm font-bold" />
                        </div>
                    </div>
                </div>

                <div className="lg:col-span-8 space-y-6 h-[500px] overflow-y-auto custom-scroll pr-2">
                    <div className="bg-indigo-600/5 p-5 rounded-2xl border border-indigo-500/10">
                        <h3 className="text-indigo-400 font-bold mb-4 uppercase text-xs tracking-wider flex justify-between items-center">
                            <span>Bảng Nhập Đáp Án Đầu Vào</span>
                            <span className="bg-indigo-500/20 px-2 py-0.5 rounded text-[10px]">{numP1} câu</span>
                        </h3>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                            {[...Array(parseInt(numP1) || 0)].map((_, i) => (
                                <div key={i} className="flex items-center gap-2 bg-slate-950 p-2 rounded-xl border border-slate-850">
                                    <span className="text-xs font-bold text-slate-500 w-8 text-center">C.{i+1}</span>
                                    <select value={ansP1[i+1] || ''} onChange={e => setAnsP1({...ansP1, [i+1]: e.target.value})} className="flex-1 bg-slate-900 text-white text-xs font-bold p-1.5 rounded border border-slate-800 outline-none cursor-pointer focus:border-indigo-500">
                                        <option value="">Chọn</option>
                                        <option value="A">A</option><option value="B">B</option>
                                        <option value="C">C</option><option value="D">D</option>
                                    </select>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
            <div className="flex justify-end gap-3 mt-8 pt-5 border-t border-slate-800">
                <button type="button" onClick={onCancel} className="px-6 py-2.5 rounded-xl font-bold uppercase text-xs tracking-wider bg-slate-800 text-slate-300 hover:bg-slate-700 transition-colors">Hủy Bỏ</button>
                <button type="submit" disabled={isSaving} className="px-6 py-2.5 rounded-xl font-bold uppercase text-xs tracking-wider bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg shadow-indigo-600/20 hover:from-indigo-500 hover:to-purple-500 transition-all flex items-center gap-2 disabled:opacity-50">
                    {isSaving ? <Icon name="loader" size={16} className="animate-spin" /> : <Icon name="save" size={16}/>}
                    {isSaving ? "Đang lưu..." : "Lưu Vào Google Sheet"}
                </button>
            </div>
        </form>
    );
};

// --- 3. KHO QUẢN LÝ ĐỀ THI ---
const ExamsMain = ({ exams, onRefresh }) => {
    const [editing, setEditing] = useState(false);
    const [isDeleting, setIsDeleting] = useState(false);

    if (editing !== false) {
        return <ExamForm initialData={editing || null} onSave={async (payload) => {
            try {
                const res = await fetch(`${API_URL}?action=save_exam`, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.success) {
                    alert('Đã lưu đề thi thành công lên Sheet!');
                    setEditing(false); 
                    onRefresh();
                } else {
                    alert("Lỗi từ Google: " + result.message);
                }
            } catch (err) { alert('Lỗi đường truyền mạng: ' + err); }
        }} onCancel={() => setEditing(false)} />;
    }

    const deleteExam = async (id) => {
        if(window.confirm('Cảnh báo: Hành động này sẽ xóa đề thi này trên Google Sheets. Tiếp tục?')) {
            setIsDeleting(true);
            try {
                const res = await fetch(`${API_URL}?action=delete_exam`, { method: 'POST', body: JSON.stringify({id}) });
                const result = await res.json();
                if(result.success) {
                    alert('Đã xóa thành công!');
                    onRefresh();
                }
            } catch (err) { alert('Lỗi khi xóa: ' + err); }
            setIsDeleting(false);
        }
    };

    return (
        <div className="space-y-6 animate-fade-in">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-900/40 p-6 rounded-2xl border border-slate-800 gap-4">
                <div>
                    <h2 className="text-2xl font-black text-white">Kho Cấu Trúc Đề</h2>
                    <p className="text-xs text-slate-400 mt-0.5">Đồng bộ trực tiếp với danh sách bảng tính Tab [DeThi].</p>
                </div>
                <button onClick={() => setEditing(null)} className="px-5 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold uppercase text-xs tracking-widest flex items-center gap-2 shadow-lg shadow-indigo-600/10 transition-all"><Icon name="file-plus" size={16}/> Thêm Đề Thi Mới</button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                {exams.map(ex => (
                    <div key={ex.id} className="bg-slate-900/60 rounded-2xl p-6 border border-slate-800 hover:border-indigo-500/40 transition-all duration-300 shadow-xl flex flex-col justify-between group glow-card">
                        <div>
                            <h3 className="text-lg font-bold text-white group-hover:text-indigo-400 transition-colors line-clamp-2">{ex.title}</h3>
                            <div className="flex flex-wrap gap-2 items-center text-xs font-semibold mb-6 mt-3">
                                <span className="bg-slate-950 text-slate-400 px-3 py-1 rounded-lg border border-slate-800/80 flex items-center gap-1"><Icon name="clock" size={12}/> {ex.duration} Phút</span>
                                <span className="bg-indigo-950/60 text-indigo-400 px-3 py-1 rounded-lg border border-indigo-900/30">Tổng: {Object.keys(ex.questions || {}).length} câu hỏi</span>
                            </div>
                        </div>
                        <div className="flex gap-2 border-t border-slate-850 pt-4">
                            <button onClick={() => setEditing(ex)} className="flex-1 py-2.5 bg-slate-800 hover:bg-indigo-600 hover:text-white text-slate-300 rounded-xl font-bold text-xs uppercase tracking-wider flex items-center justify-center gap-1.5 transition-all"><Icon name="edit" size={14}/> Sửa Đề</button>
                            <button onClick={() => deleteExam(ex.id)} disabled={isDeleting} className="w-11 h-11 flex items-center justify-center bg-rose-950 text-rose-400 border border-rose-900 hover:bg-rose-600 hover:text-white rounded-xl transition-all disabled:opacity-50"><Icon name="trash-2" size={16}/></button>
                        </div>
                    </div>
                ))}
                {exams.length === 0 && (
                    <div className="col-span-full text-slate-500 py-24 text-center border border-dashed border-slate-800 rounded-2xl bg-slate-950/20 font-medium">Không tìm thấy dữ liệu đề thi trên Sheet.</div>
                )}
            </div>
        </div>
    );
};

// --- 4. COMPONENT QUẢN LÝ TÀI KHOẢN HỌC SINH ---
const StudentsManager = ({ students, onRefresh }) => {
    const [list, setList] = useState([]);
    const [isSaving, setIsSaving] = useState(false);

    useEffect(() => {
        setList(Object.entries(students).map(([u, d]) => ({ username: u, ...d })));
    }, [students]);

    const updateRow = (index, field, value) => {
        const newList = [...list];
        newList[index][field] = value;
        setList(newList);
    };

    const handleSave = async () => {
        setIsSaving(true);
        const obj = {};
        list.forEach(s => {
            if (s.username && s.username.trim() !== '') {
                obj[s.username.trim()] = { password: s.password, name: s.name, group: s.group };
            }
        });
        
        try {
            const response = await fetch(`${API_URL}?action=save_students`, { 
                method: 'POST', 
                body: JSON.stringify({students: obj})
            });
            const result = await response.json();
            
            if(result.success) {
                alert('Đã cập nhật dữ liệu học sinh thành công lên Google Sheet!');
                onRefresh();
            } else {
                alert("Lỗi từ máy chủ: " + result.message);
            }
        } catch (err) {
            alert('Đã xảy ra lỗi mạng: ' + err.toString());
        }
        setIsSaving(false);
    };

    return (
        <div className="cyber-panel rounded-2xl border border-slate-800 overflow-hidden flex flex-col h-full animate-fade-in">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 border-b border-slate-800 shrink-0 gap-4">
                <div>
                    <h2 className="text-2xl font-black text-white">Xác Thực Học Viên</h2>
                    <p className="text-xs text-slate-400 mt-0.5">Danh sách định danh được phân quyền làm bài thi.</p>
                </div>
                <div className="flex gap-2 w-full sm:w-auto">
                    <button onClick={() => setList([{username:'', password:'', name:'', group:''}, ...list])} className="flex-1 sm:flex-none px-4 py-2.5 bg-cyan-950 text-cyan-400 hover:bg-cyan-900 rounded-xl font-bold text-xs uppercase tracking-wider flex items-center justify-center gap-1 border border-cyan-900/50 transition-colors"><Icon name="user-plus" size={14}/> Thêm Ô</button>
                    <button onClick={handleSave} disabled={isSaving} className="flex-1 sm:flex-none px-4 py-2.5 bg-gradient-to-r from-indigo-600 to-cyan-600 text-white rounded-xl font-bold text-xs uppercase tracking-wider flex items-center justify-center gap-1 shadow-md shadow-indigo-600/10 transition-colors disabled:opacity-50">
                        {isSaving ? <Icon name="loader" size={14} className="animate-spin" /> : <Icon name="save" size={14}/>}
                        {isSaving ? 'Đang lưu...' : 'Lưu Lên Sheet'}
                    </button>
                </div>
            </div>
            <div className="overflow-x-auto flex-1 custom-scroll p-6">
                <table className="w-full text-left border-collapse">
                    <thead>
                        <tr className="text-[11px] uppercase tracking-wider font-extrabold text-slate-400 bg-slate-950 border border-slate-850">
                            <th className="p-4 w-44">Tài khoản (SBD)</th>
                            <th className="p-4 w-44">Mật khẩu khóa</th>
                            <th className="p-4">Họ và Tên Học Sinh</th>
                            <th className="p-4 w-36">Lớp / Nhóm</th>
                            <th className="p-4 w-16 text-center">Xóa</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-850">
                        {list.map((s, i) => (
                            <tr key={i} className="hover:bg-slate-900/40 transition-colors">
                                <td className="p-2"><input value={s.username} onChange={e => updateRow(i, 'username', e.target.value)} className="w-full bg-slate-950/60 border border-slate-800 focus:border-indigo-500 p-2.5 rounded-xl outline-none font-semibold text-xs text-indigo-400" placeholder="Mã định danh" /></td>
                                <td className="p-2"><input value={s.password} onChange={e => updateRow(i, 'password', e.target.value)} className="w-full bg-slate-950/60 border border-slate-800 focus:border-indigo-500 p-2.5 rounded-xl outline-none text-xs text-slate-300" placeholder="Mật khẩu" /></td>
                                <td className="p-2"><input value={s.name} onChange={e => updateRow(i, 'name', e.target.value)} className="w-full bg-slate-950/60 border border-slate-800 focus:border-indigo-500 p-2.5 rounded-xl outline-none font-bold text-xs text-white" placeholder="Họ tên đầy đủ" /></td>
                                <td className="p-2"><input value={s.group} onChange={e => updateRow(i, 'group', e.target.value)} className="w-full bg-slate-950/60 border border-slate-800 focus:border-indigo-500 p-2.5 rounded-xl outline-none text-xs text-slate-300 font-medium" placeholder="Ví dụ: 12A1" /></td>
                                <td className="p-2 text-center"><button onClick={() => setList(list.filter((_, idx) => idx !== i))} className="p-2 text-slate-500 hover:bg-rose-500/10 hover:text-rose-400 rounded-lg transition-all"><Icon name="trash-2" size={16}/></button></td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );
};

// --- 5. COMPONENT LỊCH SỬ THI ---
const HistoryViewer = ({ history, onRefresh }) => {
    return (
        <div className="cyber-panel rounded-2xl border border-slate-800 overflow-hidden flex flex-col h-full animate-fade-in">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 border-b border-slate-800 shrink-0 gap-4">
                <div>
                    <h2 className="text-2xl font-black text-white">Nhật Ký Khảo Sát & Bảng Điểm</h2>
                    <p className="text-xs text-slate-400 mt-0.5">Dữ liệu nộp bài của học sinh được lưu trữ tập trung tại Tab [LichSu].</p>
                </div>
            </div>
            <div className="overflow-x-auto custom-scroll flex-1 p-6">
                <table className="w-full text-left border-collapse">
                    <thead>
                        <tr className="text-[11px] uppercase tracking-wider font-extrabold text-slate-400 bg-slate-950 border border-slate-850">
                            <th className="p-4">Thời gian nộp</th>
                            <th className="p-4">Tên Thí Sinh</th>
                            <th className="p-4">Khối/Nhóm</th>
                            <th className="p-4">Đề khảo sát</th>
                            <th className="p-4 text-emerald-400">Kết quả Điểm</th>
                            <th className="p-4 text-center">Giám sát vi phạm</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-850">
                        {history.slice().reverse().map((h, i) => (
                            <tr key={i} className="hover:bg-slate-900/30 transition-colors">
                                <td className="p-4 text-xs text-slate-400">{h.submitted_at}</td>
                                <td className="p-4 text-xs font-bold text-white">{h.name}</td>
                                <td className="p-4 text-xs text-slate-300">{h.group}</td>
                                <td className="p-4 text-xs text-indigo-400 font-semibold">{h.examTitle}</td>
                                <td className="p-4 text-xl text-emerald-400 font-black">{h.score}</td>
                                <td className="p-4 text-center">
                                    <span className={`px-2.5 py-1 rounded-lg text-[10px] font-bold ${h.cheat && h.cheat.includes('0 lần') ? 'bg-slate-950 text-slate-500' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}`}>
                                        {h.cheat || 'Bình thường'}
                                    </span>
                                </td>
                            </tr>
                        ))}
                        {history.length === 0 && <tr><td colSpan="6" className="p-16 text-center text-slate-500 text-xs font-semibold">Chưa có lượt nộp bài nào trên hệ thống.</td></tr>}
                    </tbody>
                </table>
            </div>
        </div>
    );
};

// ==========================================
// APP MAIN BỌC GIAO DIỆN CHÍNH
// ==========================================
const App = () => {
    const [view, setView] = useState('auth');
    const [data, setData] = useState({ exams: [], students: {}, history: [] });

    const fetchData = async () => {
        try {
            const res = await fetch(`${API_URL}?action=get_all`);
            const resData = await res.json();
            if (resData) {
                setData(resData);
            }
        } catch (e) {
            console.error("Lỗi đồng bộ Cloud Sheets:", e);
        }
    };

    useEffect(() => { 
        fetchData(); 
    }, []);

    const handleLogin = (e) => {
        e.preventDefault();
        if (e.target.u.value === 'Minhphat' && e.target.p.value === '12345') {
            setView('dashboard');
        } else {
            alert("Truy cập thất bại! Sai thông tin Admin.");
        }
    };

    if (view === 'auth') return (
        <div className="h-screen flex items-center justify-center bg-[#010409] p-6 relative overflow-hidden">
            <div className="absolute top-[-20%] left-[-20%] w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>
            <div className="absolute bottom-[-20%] right-[-20%] w-[500px] h-[500px] bg-cyan-600/10 rounded-full blur-[120px] pointer-events-none"></div>
            <div className="w-full max-w-md bg-slate-900/40 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-slate-800/80 relative z-10">
                <div className="flex flex-col items-center mb-8">
                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-4 rounded-2xl shadow-xl text-white mb-3">
                        <Icon name="fingerprint" size={36}/>
                    </div>
                    <h2 className="text-xl font-black text-white tracking-widest uppercase">Admin Terminal</h2>
                    <p className="text-[10px] text-indigo-400 font-bold uppercase tracking-widest mt-1">Đồng bộ dữ liệu Cloud Google Sheets</p>
                </div>
                <form onSubmit={handleLogin} className="space-y-4">
                    <div>
                        <label className="block text-[10px] font-extrabold text-slate-400 mb-2 uppercase tracking-wider">Mã định danh quản trị</label>
                        <input name="u" required className="w-full p-3.5 bg-slate-950/80 border border-slate-800 focus:border-indigo-500 rounded-xl outline-none text-white font-bold text-sm transition-colors" placeholder="Tên đăng nhập" />
                    </div>
                    <div>
                        <label className="block text-[10px] font-extrabold text-slate-400 mb-2 uppercase tracking-wider">Mật mã bảo mật</label>
                        <input name="p" type="password" required className="w-full p-3.5 bg-slate-950/80 border border-slate-800 focus:border-indigo-500 rounded-xl outline-none text-white font-bold text-sm tracking-widest transition-colors" placeholder="••••••••" />
                    </div>
                    <button className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3.5 rounded-xl font-bold uppercase tracking-wider text-xs shadow-lg shadow-indigo-600/20 hover:opacity-90 transition-opacity mt-4">Khởi Chạy Terminal</button>
                </form>
            </div>
        </div>
    );

    return (
        <div className="flex h-screen bg-[#030712] text-slate-200 overflow-hidden">
            <aside className="w-72 bg-slate-950/40 backdrop-blur-md border-r border-slate-900 flex flex-col shrink-0 relative z-20">
                <div className="p-6 border-b border-slate-900 flex items-center gap-3">
                    <div className="bg-gradient-to-tr from-indigo-500 to-cyan-500 p-2 rounded-xl text-white shadow-md"><Icon name="component" size={20}/></div>
                    <div>
                        <h1 className="font-black text-sm text-white tracking-widest uppercase leading-none">Minh Phat</h1>
                        <p className="text-[9px] text-cyan-400 font-bold tracking-wider uppercase mt-1">Cloud Management</p>
                    </div>
                </div>
                <nav className="flex-1 p-4 space-y-1.5">
                    {[
                        {id: 'dashboard', name: 'Trang Tổng Quan', icon: 'layout-dashboard'},
                        {id: 'exams', name: 'Kho Cấu Trúc Đề', icon: 'file-spreadsheet'},
                        {id: 'students', name: 'Xác Thực Học Viên', icon: 'shield-check'},
                        {id: 'history', name: 'Nhật Ký & Bảng Điểm', icon: 'activity'},
                    ].map(item => (
                        <button key={item.id} onClick={() => { setView(item.id); fetchData(); }} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold text-xs uppercase tracking-wider transition-all ${view === item.id ? 'bg-gradient-to-r from-indigo-600/20 to-indigo-600/5 border border-indigo-500/30 text-indigo-400 shadow-sm shadow-indigo-500/5' : 'text-slate-400 border border-transparent hover:bg-slate-900/50 hover:text-white'}`}>
                            <Icon name={item.icon} size={16}/> {item.name}
                        </button>
                    ))}
                </nav>
                <div className="p-4 border-t border-slate-900">
                    <button onClick={() => setView('auth')} className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl font-bold text-xs uppercase tracking-wider text-rose-400 bg-rose-950/10 hover:bg-rose-950/30 border border-rose-900/20 transition-all"><Icon name="power" size={14}/> Đăng xuất an toàn</button>
                </div>
            </aside>
            <main className="flex-1 overflow-y-auto custom-scroll p-6 md:p-8 relative">
                <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-indigo-500/5 rounded-full blur-[100px] pointer-events-none"></div>
                <div className="max-w-7xl mx-auto h-full relative z-10 flex flex-col justify-between">
                    <div className="flex-1">
                        {view === 'dashboard' && <DashboardView data={data} />}
                        {view === 'exams' && <ExamsMain exams={data.exams} onRefresh={fetchData} />}
                        {view === 'students' && <StudentsManager students={data.students} onRefresh={fetchData} />}
                        {view === 'history' && <HistoryViewer history={data.history} onRefresh={fetchData} />}
                    </div>
                    <div className="mt-12 pt-6 border-t border-slate-900/60 text-center text-slate-600 text-[10px] font-bold uppercase tracking-widest">Hệ thống quản trị thuộc sở hữu của <strong className="text-slate-400">Đặng Minh Phát</strong></div>
                </div>
            </main>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
